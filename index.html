<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Groups Display</title>

    <style>
        /* Base styles */
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background-color: #050303;
            color: #d3d3d3; /* light grey text */
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header with buttons */
        header {
            display: flex;
            justify-content: center;
            gap: 10px;
            padding: 15px;
            background-color: #0d0d0d;
            border-bottom: 1px solid #222;
            flex-wrap: wrap;
        }

        header button {
            background-color: #1a1a1a;
            color: #d3d3d3;
            border: 1px solid #333;
            padding: 10px 18px;
            cursor: pointer;
            border-radius: 8px;
            font-size: 16px;
            transition: all 0.2s ease;
        }

        header button:hover {
            background-color: #2a2a2a;
            border-color: #555;
        }

        header button.active {
            background-color: #3a3a3a;
            border-color: #777;
        }

        /* Main content split layout */
        .content {
            flex: 1;
            display: flex;
            overflow: hidden;
        }

        .image-container {
            width: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border-right: 1px solid #222;
            background-color: #000;
        }

        .image-container img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;

            /* Feathered edge effect */
            -webkit-mask-image: radial-gradient(circle, rgba(0,0,0,1) 80%, rgba(0,0,0,0) 100%);
            mask-image: radial-gradient(circle, rgba(0,0,0,1) 80%, rgba(0,0,0,0) 100%);
        }

        .text-container {
            width: 50%;
            padding: 20px;
            overflow-y: auto;
        }

        .boxes-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            height: 100%;
        }

        .info-box {
            background-color: #0f0f0f;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 15px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .info-box h2 {
            margin: 0;
            font-size: 20px;
            color: #e0e0e0;
        }

        .info-box h4 {
            margin: 0;
            font-size: 14px;
            color: #a0a0a0;
            font-weight: bold;
        }

        .info-box p {
            margin-top: 8px;
            line-height: 1.5;
        }
            width: 50%;
            padding: 20px;
            overflow-y: auto;
        }

        .text-box {
            width: 100%;
            height: 100%;
            min-height: 200px;
            background-color: #0f0f0f;
            border: 1px solid #333;
            border-radius: 10px;
            padding: 15px;
            box-sizing: border-box;
            outline: none;
            line-height: 1.5;
        }

        .placeholder {
            color: #777;
        }

        /* Mobile responsiveness */
        @media (max-width: 768px) {
            .content {
                flex-direction: column;
            }

            .image-container,
            .text-container {
                width: 100%;
                height: 50%;
            }

            .image-container {
                border-right: none;
                border-bottom: 1px solid #222;
            }
        }
    </style>
</head>
<body>

<header>
    <button onclick="showGroup('a', this)" class="active">Group A</button>
    <button onclick="showGroup('b', this)">Group B</button>
    <button onclick="showGroup('c', this)">Group C</button>
    <button onclick="showGroup('d', this)">Group D</button>
    <button onclick="showGroup('e', this)">Group E</button>
    <button onclick="showGroup('f', this)">Group F</button>
</header>

<div class="content">
    <div class="image-container">
        <!-- Default image shown on load -->
        <img id="groupImage" src="groupa.jpg" alt="Group Image">
    </div>

    <div class="text-container">
        <div class="boxes-grid">
            <div class="info-box">
                <h2 id="box1-title">Title 1</h2>
                <h4 id="box1-subheader">Subheader 1</h4>
                <p id="box1-body">Body text 1</p>
            </div>

            <div class="info-box">
                <h2 id="box2-title">Title 2</h2>
                <h4 id="box2-subheader">Subheader 2</h4>
                <p id="box2-body">Body text 2</p>
            </div>

            <div class="info-box">
                <h2 id="box3-title">Title 3</h2>
                <h4 id="box3-subheader">Subheader 3</h4>
                <p id="box3-body">Body text 3</p>
            </div>

            <div class="info-box">
                <h2 id="box4-title">Title 4</h2>
                <h4 id="box4-subheader">Subheader 4</h4>
                <p id="box4-body">Body text 4</p>
            </div>
        </div>
    </div>
</div>

<script>
    // =====================================================
    // EDIT YOUR GROUP CONTENT HERE
    // Each group has 4 boxes: title, subheader, body
    // =====================================================

    const groupContent = {
        a: [
            { title: "Manta", subheader: "$60 - Seed: 1", body: "A newcomer to Battlebots, but a champion of Robogames which is a similar, but smaller, competition featuring other notable Battlebots. Probably the most hyped-up rookie in the history of the show." },
            { title: "Skorpios", subheader: "$40 - Seed: 2", body: "A consistently mid bot. Dominant against horizontal spinners, has a tanky design with a weak weapon." },
            { title: "Valkyrie", subheader: "$30 - Seed: 3", body: "A bot that spontaneously shows a lot of potential, but has achieved very little. Its weapon is incredibly powerful and it can be a very scary opponent - just as long as that spinner is actually working." },
            { title: "Terrortops", subheader: "$10 - Seed: 4", body: "Terrortops low-tier bot, while they have shown that they can consistently beat other low-tier opponents, they are yet to prove they can beat teams they’re about to face in Group A. Their general strategy is to lift up their opposition, to hit their underside with the vertical spinner." }
        ],
        b: [
            { title: "Dissaray", subheader: "$10 - Seed: 4", body: "Really cute manta ray aesthetic, but it's otherwise a boring and unproven bot. It was unfortunately chosen to replace Claw Viper after they pulled out, instead of a much cooler bot called Calypso." },
            { title: "Mad Catter", subheader: "$60 - Seed: 1", body: "A very consistent and reliable bot. Cool aesthetics and a fan-favourite team leader, but overall, there’s not much to say, it’s just another 4wd Vert." },
            { title: "Tombstone", subheader: "$20 - Seed: 3", body: "1x Battlebots Champion, 1x Finalist, and 1x Semi-Finalist during the first 4 seasons. Nicknamed ‘The King of Kinetic Energy’ probably had the biggest fall-off of any bot other than Ghost Raptor which got split into 3 pieces by Cobalt. This was mostly due to lack of upgrades and the meta be fairly anti-horizontal spinner. However, Tombstone has undergone some extensive upgrades, almost looking like an entirely new bot, despite its opponents in this group all being 4wd Verts, Tombstone may genuinely have a chance of topping the table." },
            { title: "Magnitude", subheader: "$10 - Seed 2", body: "Rookie bot with a lot of potential. We haven’t seen a lot of this bot, but if they can fix their reliability issues, they may be a real contender." }
        ],
        c: [
            { title: "Cobalt", subheader: "$50 - Seed: 3", body: "A bot known for tearing its opponents to shreds, it somehow has only 1 win over a top-tier opponent, and only due to that bot getting stuck and the fight getting called off because Cobalt couldn’t spin down their weapon for their opponent to get released safely. This bot shows that it can potentially be a future S-Tier, but is yet to prove it." },
            { title: "Copperhead", subheader: "$80 - Seed: 1", body: "A bot with a very powerful weapon, with multiple big-time wins, including one against No.1 bot End Game. Hasn’t had any big achievements other than that, with its best result reaching the Semi-Finals in the most recent season." },
            { title: "The Twins", subheader: "$50 - Seed: 2", body: "A fairly unremarkable bot that somehow keeps pulling upsets out of nowhere including an upset over Cobalt. However this bot isn’t very consistent." },
            { title: "Jackpot", subheader: "$10 - Seed: 4", body: "Two bots each at 50% weight of a regular bot. They were built by a Battlebots Champion team and promptly unbuilt by a rookie no-name bot in its only ever fight." }
        ],
        d: [
            { title: "Deathroll", subheader: "$50 - Seed: 2", body: "The Aussie bot that had a strong season in 2019, but hasn’t really lived up to the hype since. If Deathroll is working as well as it did back then, expect its weapon to never stop spinning - and they’ll use it to self-right instead of using the self-right mechanism." },
            { title: "End Game", subheader: "$100 - Seed: 1", body: "This is the bot to beat. While Biteforce created the meta, End Game effectively solved it until recently. They are 1x Battlebots Champion and 2x Golden Bot Champion (smaller tournament in Battlebots), using a powerful spinner weapon, and very low-to-the-ground forks which can be swapped for a wedge against horizontal spinners. They have struggled against drum spinners in the past." },
            { title: "Malice", subheader: "$30 - Seed 3", body: "Malice, by all means, should be a strong bot. Its combination of a horizontal spinner and forks makes it a tricky opponent to go up against, especially since it’s quite a tough bot, too. But its weapon is both unreliable and somewhat weak, making them lose to many bots that they really shouldn’t." },
            { title: "Golden Fury", subheader: "$20 - Seed 4", body: "A bot from India that recently competed in a much smaller competition in the UK, to varied success. It’s an unreliable bot, but it otherwise seems well built." }
        ],
        e: [
            { title: "Bloodsport", subheader: "$40 - Seed: 4", body: "Probably the strongest horizontal spinner in the field that has unfortunately been placed in the group of death. Its weapon is fairly reliable, but it doesn’t completely depend on that, since Bloodsport has wedgelets that allows for some control." },
            { title: "HUGE", subheader: "$80 - Seed: 2", body: "It’s a really big bot that has faced more gimmick fights than normal fights due to unusual shape. HUGE is so awkward to fight, that bots usually attach long bars, tall wedges, or rakes to their bot in order to reach their centre of mass. Last season, HUGE got second overrall, proving that it's a force to be reckoned with." },
            { title: "Minotaur", subheader: "$100 - Seed: 1", body: "A Brazillian bot that is famously tough and powerful, its weapon is known for being very loud and its driver looks as though they microwave hamsters. Minotaur is very all-rounded, probably the most reliable and consistent bot; 3x Quarter-Finalist, 1x Semi-Finalist, and 1x Finalist." },
            { title: "Hypershock", subheader: "$80 - Seed: 3", body: "It’s neon, with one of the most loveable team members. They’re most known for attaching a rake to their bot to swat a drone out of the air, and 2 rakes to corral HUGE into the screws. It is very fast, the fastest bot in this competition since Claw Viper pulled out." }
        ],
        f: [
            { title: "Orbitron", subheader: "$40", body: "It is an ai driven bot, the humans only monitor it. Orbitron has shown a lot of potential during its initial fights, but its cameras and ai program creates many fault points reducing its reliability." },
            { title: "Ribbot", subheader: "$60", body: "The Upset King, they often beat bots that it has no right in beating. Somewhat technologically advanced, it has sensors throughout the bot that allows the drivers to monitor the condition of its individual components." },
            { title: "Witch Doctor", subheader: "$100", body: "Probably the most successful bot to never become Battlebots Champion, although they have won multiple, much smaller, Battlebots tourneys. They have been around since the very first season, and have kept their very cool voodoo aesthetic." },
            { title: "Switchback", subheader: "$20", body: "An innovative bot that allows for it to attack on either end of its chassy. It saw limited success, but has gotten a major glow-up since then." }
        ]
    };

    function showGroup(letter, buttonElement) {
        // Change image
        const image = document.getElementById('groupImage');
        if (image) {
            image.src = `group${letter}.jpg`;
        }

        // Change box content
        const boxes = groupContent[letter];
        if (boxes) {
            for (let i = 0; i < 4; i++) {
                document.getElementById(`box${i+1}-title`).innerText = boxes[i].title;
                document.getElementById(`box${i+1}-subheader`).innerText = boxes[i].subheader;
                document.getElementById(`box${i+1}-body`).innerText = boxes[i].body;
            }
        }

        // Update active button styling
        if (buttonElement) {
            const buttons = document.querySelectorAll('header button');
            buttons.forEach(btn => btn.classList.remove('active'));
            buttonElement.classList.add('active');
        }
    }

    // Initialize default group on page load
    document.addEventListener('DOMContentLoaded', function () {
        const firstButton = document.querySelector('header button');
        showGroup('a', firstButton);
    });
</script>

</body>
</html>
