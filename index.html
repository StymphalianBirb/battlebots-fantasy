<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Groups Display</title>

    <style>
        /* Base styles */
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background-color: #050303;
            color: #d3d3d3; /* light grey text */
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header with buttons */
        header {
            display: flex;
            justify-content: center;
            gap: 10px;
            padding: 15px;
            background-color: #0d0d0d;
            border-bottom: 1px solid #222;
            flex-wrap: wrap;
        }

        header button {
            background-color: #1a1a1a;
            color: #d3d3d3;
            border: 1px solid #333;
            padding: 10px 18px;
            cursor: pointer;
            border-radius: 8px;
            font-size: 16px;
            transition: all 0.2s ease;
        }

        header button:hover {
            background-color: #2a2a2a;
            border-color: #555;
        }

        header button.active {
            background-color: #3a3a3a;
            border-color: #777;
        }

        /* Main content split layout */
        .content {
            flex: 1;
            display: flex;
            overflow: hidden;
        }

        .image-container {
            width: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border-right: 1px solid #222;
            background-color: #000;
        }

        .image-container img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;

            /* Feathered edge effect */
            -webkit-mask-image: radial-gradient(circle, rgba(0,0,0,1) 80%, rgba(0,0,0,0) 100%);
            mask-image: radial-gradient(circle, rgba(0,0,0,1) 80%, rgba(0,0,0,0) 100%);
        }

        .text-container {
            width: 50%;
            padding: 20px;
            overflow-y: auto;
        }

        .boxes-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            height: 100%;
        }

        .info-box {
            background-color: #0f0f0f;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 15px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .info-box h2 {
            margin: 0;
            font-size: 20px;
            color: #e0e0e0;
        }

        .info-box h4 {
            margin: 0;
            font-size: 14px;
            color: #a0a0a0;
            font-weight: normal;
        }

        .info-box p {
            margin-top: 8px;
            line-height: 1.5;
        }
            width: 50%;
            padding: 20px;
            overflow-y: auto;
        }

        .text-box {
            width: 100%;
            height: 100%;
            min-height: 200px;
            background-color: #0f0f0f;
            border: 1px solid #333;
            border-radius: 10px;
            padding: 15px;
            box-sizing: border-box;
            outline: none;
            line-height: 1.5;
        }

        .placeholder {
            color: #777;
        }

        /* Mobile responsiveness */
        @media (max-width: 768px) {
            .content {
                flex-direction: column;
            }

            .image-container,
            .text-container {
                width: 100%;
                height: 50%;
            }

            .image-container {
                border-right: none;
                border-bottom: 1px solid #222;
            }
        }
    </style>
</head>
<body>

<header>
    <button onclick="showGroup('a', this)" class="active">Group A</button>
    <button onclick="showGroup('b', this)">Group B</button>
    <button onclick="showGroup('c', this)">Group C</button>
    <button onclick="showGroup('d', this)">Group D</button>
    <button onclick="showGroup('e', this)">Group E</button>
    <button onclick="showGroup('f', this)">Group F</button>
</header>

<div class="content">
    <div class="image-container">
        <!-- Default image shown on load -->
        <img id="groupImage" src="groupa.jpg" alt="Group Image">
    </div>

    <div class="text-container">
        <div class="boxes-grid">
            <div class="info-box">
                <h2 id="box1-title">Title 1</h2>
                <h4 id="box1-subheader">Subheader 1</h4>
                <p id="box1-body">Body text 1</p>
            </div>

            <div class="info-box">
                <h2 id="box2-title">Title 2</h2>
                <h4 id="box2-subheader">Subheader 2</h4>
                <p id="box2-body">Body text 2</p>
            </div>

            <div class="info-box">
                <h2 id="box3-title">Title 3</h2>
                <h4 id="box3-subheader">Subheader 3</h4>
                <p id="box3-body">Body text 3</p>
            </div>

            <div class="info-box">
                <h2 id="box4-title">Title 4</h2>
                <h4 id="box4-subheader">Subheader 4</h4>
                <p id="box4-body">Body text 4</p>
            </div>
        </div>
    </div>
</div>

<script>
    // =====================================================
    // EDIT YOUR GROUP CONTENT HERE
    // Each group has 4 boxes: title, subheader, body
    // =====================================================

    const groupContent = {
        a: [
            { title: "A Box 1 Title", subheader: "A Box 1 Subheader", body: "A Box 1 body text." },
            { title: "A Box 2 Title", subheader: "A Box 2 Subheader", body: "A Box 2 body text." },
            { title: "A Box 3 Title", subheader: "A Box 3 Subheader", body: "A Box 3 body text." },
            { title: "A Box 4 Title", subheader: "A Box 4 Subheader", body: "A Box 4 body text." }
        ],
        b: [
            { title: "B Box 1 Title", subheader: "B Box 1 Subheader", body: "B Box 1 body text." },
            { title: "B Box 2 Title", subheader: "B Box 2 Subheader", body: "B Box 2 body text." },
            { title: "B Box 3 Title", subheader: "B Box 3 Subheader", body: "B Box 3 body text." },
            { title: "B Box 4 Title", subheader: "B Box 4 Subheader", body: "B Box 4 body text." }
        ],
        c: [
            { title: "C Box 1 Title", subheader: "C Box 1 Subheader", body: "C Box 1 body text." },
            { title: "C Box 2 Title", subheader: "C Box 2 Subheader", body: "C Box 2 body text." },
            { title: "C Box 3 Title", subheader: "C Box 3 Subheader", body: "C Box 3 body text." },
            { title: "C Box 4 Title", subheader: "C Box 4 Subheader", body: "C Box 4 body text." }
        ],
        d: [
            { title: "D Box 1 Title", subheader: "D Box 1 Subheader", body: "D Box 1 body text." },
            { title: "D Box 2 Title", subheader: "D Box 2 Subheader", body: "D Box 2 body text." },
            { title: "D Box 3 Title", subheader: "D Box 3 Subheader", body: "D Box 3 body text." },
            { title: "D Box 4 Title", subheader: "D Box 4 Subheader", body: "D Box 4 body text." }
        ],
        e: [
            { title: "E Box 1 Title", subheader: "E Box 1 Subheader", body: "E Box 1 body text." },
            { title: "E Box 2 Title", subheader: "E Box 2 Subheader", body: "E Box 2 body text." },
            { title: "E Box 3 Title", subheader: "E Box 3 Subheader", body: "E Box 3 body text." },
            { title: "E Box 4 Title", subheader: "E Box 4 Subheader", body: "E Box 4 body text." }
        ],
        f: [
            { title: "F Box 1 Title", subheader: "F Box 1 Subheader", body: "F Box 1 body text." },
            { title: "F Box 2 Title", subheader: "F Box 2 Subheader", body: "F Box 2 body text." },
            { title: "F Box 3 Title", subheader: "F Box 3 Subheader", body: "F Box 3 body text." },
            { title: "F Box 4 Title", subheader: "F Box 4 Subheader", body: "F Box 4 body text." }
        ]
    };

    function showGroup(letter, buttonElement) {
        // Change image
        const image = document.getElementById('groupImage');
        if (image) {
            image.src = `group${letter}.jpg`;
        }

        // Change box content
        const boxes = groupContent[letter];
        if (boxes) {
            for (let i = 0; i < 4; i++) {
                document.getElementById(`box${i+1}-title`).innerText = boxes[i].title;
                document.getElementById(`box${i+1}-subheader`).innerText = boxes[i].subheader;
                document.getElementById(`box${i+1}-body`).innerText = boxes[i].body;
            }
        }

        // Update active button styling
        if (buttonElement) {
            const buttons = document.querySelectorAll('header button');
            buttons.forEach(btn => btn.classList.remove('active'));
            buttonElement.classList.add('active');
        }
    }

    // Initialize default group on page load
    document.addEventListener('DOMContentLoaded', function () {
        const firstButton = document.querySelector('header button');
        showGroup('a', firstButton);
    });
</script>

</body>
</html>
