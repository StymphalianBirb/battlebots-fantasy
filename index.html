<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Groups Display</title>

    <style>
        /* Base styles */
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background-color: #050303;
            color: #d3d3d3; /* light grey text */
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header with buttons */
        header {
            display: flex;
            justify-content: center;
            gap: 10px;
            padding: 15px;
            background-color: #0d0d0d;
            border-bottom: 1px solid #222;
            flex-wrap: wrap;
        }

        header button {
            background-color: #1a1a1a;
            color: #d3d3d3;
            border: 1px solid #333;
            padding: 10px 18px;
            cursor: pointer;
            border-radius: 8px;
            font-size: 16px;
            transition: all 0.2s ease;
        }

        header button:hover {
            background-color: #2a2a2a;
            border-color: #555;
        }

        header button.active {
            background-color: #3a3a3a;
            border-color: #777;
        }

        /* Main content split layout */
        .content {
            flex: 1;
            display: flex;
            overflow: hidden;
        }

        .image-container {
            width: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border-right: 1px solid #222;
            background-color: #000;
        }

        .image-container img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;

            /* Feathered edge effect */
            -webkit-mask-image: radial-gradient(circle, rgba(0,0,0,1) 80%, rgba(0,0,0,0) 100%);
            mask-image: radial-gradient(circle, rgba(0,0,0,1) 80%, rgba(0,0,0,0) 100%);
        }

        .text-container {
            width: 50%;
            padding: 20px;
            overflow-y: auto;
        }

        .text-box {
            width: 100%;
            height: 100%;
            min-height: 200px;
            background-color: #0f0f0f;
            border: 1px solid #333;
            border-radius: 10px;
            padding: 15px;
            box-sizing: border-box;
            outline: none;
            line-height: 1.5;
        }

        .placeholder {
            color: #777;
        }

        /* Mobile responsiveness */
        @media (max-width: 768px) {
            .content {
                flex-direction: column;
            }

            .image-container,
            .text-container {
                width: 100%;
                height: 50%;
            }

            .image-container {
                border-right: none;
                border-bottom: 1px solid #222;
            }
        }
    </style>
</head>
<body>

<header>
    <button onclick="showGroup('a', this)" class="active">Group A</button>
    <button onclick="showGroup('b', this)">Group B</button>
    <button onclick="showGroup('c', this)">Group C</button>
    <button onclick="showGroup('d', this)">Group D</button>
    <button onclick="showGroup('e', this)">Group E</button>
    <button onclick="showGroup('f', this)">Group F</button>
</header>

<div class="content">
    <div class="image-container">
        <!-- Default image shown on load -->
        <img id="groupImage" src="groupa.jpg" alt="Group Image">
    </div>

    <div class="text-container">
        <!-- You can type directly into this box in the browser, or replace the content in the HTML -->
        <div id="textBox" class="text-box">
            <!-- Edit the text for each group inside the script section below -->
            Group A text goes here.
        </div>
    </div>
</div>

<script>
    // =====================================================
    // EDIT YOUR GROUP TEXT HERE
    // You can use normal text or HTML (e.g., <br>, <b>, lists)
    // =====================================================

    const groupTexts = {
        a: `Manta
$60		Eggbeater Drum (Vertical Spinner)
A newcomer to Battlebots, but a 2 time champion of Robogames which is a similar competition with weaker opposition. Probably the most hyped-up rookie in the history of the show.
Skorpios
$40		Hammer-Saw
A consistently mid bot. Dominant against horizontal spinners, has a tanky design with a weak weapon.
Valkyrie
$30		Undercutter	(Horizontal Spinner)
A bot that spontaneously shows a lot of potential, but has achieved very little. Its weapon is incredibly powerful and it can be a very scary opponent - just as long as that spinner is actually working.
Terrortops
$10		Lifter and Vertical Disk Spinner
Terrortops is owned by a family team, while they have shown that they can consistently beat low-tier opponents, they are yet to prove they can beat teams they’re about to face in Group A. Their general strategy is to lift up their opposition, to hit their underside with the vertical spinner.
`,
        b: `Group B text goes here.`,
        c: `Group C text goes here.`,
        d: `Group D text goes here.`,
        e: `Group E text goes here.`,
        f: `Group F text goes here.`
    };

    function showGroup(letter, buttonElement) {
        // Change image
        const image = document.getElementById('groupImage');
        image.src = `group${letter}.jpg`;

        // Change text
        const textBox = document.getElementById('textBox');
        textBox.innerHTML = groupTexts[letter];

        // Update active button styling
        const buttons = document.querySelectorAll('header button');
        buttons.forEach(btn => btn.classList.remove('active'));
        buttonElement.classList.add('active');
    }

    // Ensure correct default text on page load
    document.addEventListener('DOMContentLoaded', function () {
        const textBox = document.getElementById('textBox');
        textBox.innerHTML = groupTexts['a'];
    });
</script>

</body>
</html>
