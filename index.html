<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Groups Display</title>

    <style>
        /* Base styles */
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background-color: #050303;
            color: #d3d3d3; /* light grey text */
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header with buttons */
        header {
            display: flex;
            justify-content: center;
            gap: 10px;
            padding: 15px;
            background-color: #0d0d0d;
            border-bottom: 1px solid #222;
            flex-wrap: wrap;
        }

        header button {
            background-color: #1a1a1a;
            color: #d3d3d3;
            border: 1px solid #333;
            padding: 10px 18px;
            cursor: pointer;
            border-radius: 8px;
            font-size: 16px;
            transition: all 0.2s ease;
        }

        header button:hover {
            background-color: #2a2a2a;
            border-color: #555;
        }

        header button.active {
            background-color: #3a3a3a;
            border-color: #777;
        }

        /* Main content split layout */
        .content {
            flex: 1;
            display: flex;
            overflow: hidden;
        }

        .image-container {
            width: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border-right: 1px solid #222;
            background-color: #000;
        }

        .image-container img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;

            /* Feathered edge effect */
            -webkit-mask-image: radial-gradient(circle, rgba(0,0,0,1) 80%, rgba(0,0,0,0) 100%);
            mask-image: radial-gradient(circle, rgba(0,0,0,1) 80%, rgba(0,0,0,0) 100%);
        }

        .text-container {
            width: 50%;
            padding: 20px;
            overflow-y: auto;
        }

        .text-box {
            width: 100%;
            height: 100%;
            min-height: 200px;
            background-color: #0f0f0f;
            border: 1px solid #333;
            border-radius: 10px;
            padding: 15px;
            box-sizing: border-box;
            outline: none;
            line-height: 1.5;
        }

        .placeholder {
            color: #777;
        }

        /* Mobile responsiveness */
        @media (max-width: 768px) {
            .content {
                flex-direction: column;
            }

            .image-container,
            .text-container {
                width: 100%;
                height: 50%;
            }

            .image-container {
                border-right: none;
                border-bottom: 1px solid #222;
            }
        }
    </style>
</head>
<body>

<header>
    <button onclick="showGroup('a', this)" class="active">Group A</button>
    <button onclick="showGroup('b', this)">Group B</button>
    <button onclick="showGroup('c', this)">Group C</button>
    <button onclick="showGroup('d', this)">Group D</button>
    <button onclick="showGroup('e', this)">Group E</button>
    <button onclick="showGroup('f', this)">Group F</button>
</header>

<div class="content">
    <div class="image-container">
        <!-- Default image shown on load -->
        <img id="groupImage" src="groupa.jpg" alt="Group Image">
    </div>

    <div class="text-container">
        <!-- You can type directly into this box in the browser, or replace the content in the HTML -->
        <div id="textBox" class="text-box placeholder" contenteditable="true">
            Enter text for this group here...
        </div>
    </div>
</div>

<script>
    function showGroup(letter, buttonElement) {
        // Change image
        const image = document.getElementById('groupImage');
        image.src = `group${letter}.jpg`;

        // Update active button styling
        const buttons = document.querySelectorAll('header button');
        buttons.forEach(btn => btn.classList.remove('active'));
        buttonElement.classList.add('active');

        // Optional: You can later customize text changes here if desired
        const textBox = document.getElementById('textBox');

        if (textBox.classList.contains('placeholder')) {
            textBox.classList.remove('placeholder');
        }
    }
</script>

</body>
</html>
